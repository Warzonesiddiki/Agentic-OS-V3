version: '3.8'

networks:
  nexus-monitoring:
    driver: bridge
    name: nexus-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: nexus-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./docs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - nexus-monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  grafana:
    image: grafana/grafana:11.4.0
    container_name: nexus-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/monitoring/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docs/monitoring/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docs/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/nexus-red.json:ro
    networks:
      - nexus-monitoring
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  loki:
    image: grafana/loki:3.2.1
    container_name: nexus-loki
    restart: always
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
    networks:
      - nexus-monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  prometheus_data:
    name: nexus_prometheus_data
  grafana_data:
    name: nexus_grafana_data
  loki_data:
    name: nexus_loki_data
