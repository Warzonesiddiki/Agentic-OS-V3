openapi: 3.0.3
info:
  title: NEXUS 2.0 API
  description: >
    REST + MCP + SSE API for NEXUS 2.0 — a persistent memory, recall, skills,
    governance, and coordination layer for AI agents (the "Agentic OS").
    This spec is generated from `server/src/routes/*.ts`.

    Every handler returns a consistent JSON envelope:
      - success: `{ ok: true, data: <T>, traceId: string }`
      - error:   `{ ok: false, error: { code: string, message: string }, traceId: string }`
    Authentication uses a scoped bearer API key (`Authorization: Bearer <NEXUS_API_KEY>`).
    A kill switch (HTTP 423) blocks all mutating operations when engaged.
  version: "3.0.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:9900
    description: Local development server
  - url: https://nexus.example.com
    description: Production (set NODE_ENV=production)

security:
  - bearerAuth: []

tags:
  - name: Kernel
    description: Agentic OS kernel — lifecycle, rings, scheduler, barriers.
  - name: Recall
    description: Token-budgeted recall (BM25 + vector RRF) and federated proofs.
  - name: Memory
    description: Memory CRUD, tags, templates, clustering, contradictions.
  - name: Orchestration
    description: Agents, tasks, A2A, DAG/pipeline execution.
  - name: Security
    description: Kill switch, audit, compliance, guardrails, rate limit.
  - name: Self-Optimization
    description: Phase 18 auto-tuner control plane.
  - name: Enterprise
    description: Multi-tenant orgs, OIDC/SAML, federated mesh.
  - name: Marketplace
    description: Plugin/skill marketplace + WASM runtime.
  - name: Analytics
    description: Metrics, health, overhead, traces.
  - name: MCP
    description: Model Context Protocol endpoint.

paths:
  /api/v1/health:
    get:
      tags: [Analytics]
      summary: Server health, DB status, kill-switch state
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }

  /api/v1/metrics:
    get:
      tags: [Analytics]
      summary: Prometheus-formatted metrics
      security: []
      responses:
        '200':
          description: text/plain; version=0.0.4

  /metrics:
    get:
      tags: [Analytics]
      summary: Prometheus metrics (analytics app)
      security: []
      responses:
        '200':
          description: text/plain

  /api/v1/kernel/state-machine:
    get:
      tags: [Kernel]
      summary: Export the kernel state machine
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/ring-policy:
    get:
      tags: [Kernel]
      summary: Get per-ring policy
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    patch:
      tags: [Kernel]
      summary: Update a ring policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ring: { type: integer, enum: [0,1,2,3,4] }
                budget: { type: number }
                priority: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/ring-budget:
    get:
      tags: [Kernel]
      summary: Get ring budget status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/held-resources:
    get:
      tags: [Kernel]
      summary: List resources held by agents (priority inheritance)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/barrier/{name}:
    get:
      tags: [Kernel]
      summary: Get barrier status
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    post:
      tags: [Kernel]
      summary: Wait on a barrier
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/worker-health:
    get:
      tags: [Kernel]
      summary: Worker health score
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/cgroups:
    get:
      tags: [Kernel]
      summary: List cgroups
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/{id}/lifecycle-hooks:
    post:
      tags: [Kernel]
      summary: Register lifecycle hooks for an agent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/gang/{taskId}:
    get:
      tags: [Kernel]
      summary: Get gang members for a task
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/latency:
    get:
      tags: [Kernel]
      summary: Queue latency percentiles
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/policy:
    get:
      tags: [Kernel]
      summary: Get scheduling policy (mlfq | edf | fairshare)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    post:
      tags: [Kernel]
      summary: Set scheduling policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy: { type: string, enum: [mlfq, edf, fairshare] }
                dryRun: { type: boolean }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/dry-run:
    get:
      tags: [Kernel]
      summary: Run scheduler dry-run
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/hierarchical:
    get:
      tags: [Kernel]
      summary: List hierarchical scheduling teams
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/hierarchical/team:
    post:
      tags: [Kernel]
      summary: Create a hierarchical scheduling team
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/introspect:
    get:
      tags: [Kernel]
      summary: Kernel introspection snapshot
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/introspect/rings:
    get:
      tags: [Kernel]
      summary: Ring snapshot
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/introspect/resources:
    get:
      tags: [Kernel]
      summary: Resource snapshot
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/introspect/gangs:
    get:
      tags: [Kernel]
      summary: Gang snapshot
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/kernel/introspect/health:
    get:
      tags: [Kernel]
      summary: Kernel health snapshot
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/memories:
    get:
      tags: [Memory]
      summary: List memories (cursor pagination)
      parameters:
        - { name: projectId, in: query, schema: { type: string } }
        - { name: kind, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    post:
      tags: [Memory]
      summary: Create a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind: { type: string }
                title: { type: string }
                content: { type: string }
                projectId: { type: string }
                tags: { type: array, items: { type: string } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/memories/{id}:
    get:
      tags: [Memory]
      summary: Get a single memory
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    patch:
      tags: [Memory]
      summary: Update a memory
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    delete:
      tags: [Memory]
      summary: Delete a memory
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/recall:
    get:
      tags: [Recall]
      summary: Token-budgeted recall (BM25 + vector RRF)
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: budget, in: query, schema: { type: integer } }
        - { name: projectId, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/federated/stats:
    get:
      tags: [Recall]
      summary: Federated proof + privacy-budget stats
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/federated/proof:
    post:
      tags: [Recall]
      summary: Publish a signed memory proof
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/federated/verify:
    post:
      tags: [Recall]
      summary: Verify a memory proof signature
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/agents:
    get:
      tags: [Orchestration]
      summary: List agents
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    post:
      tags: [Orchestration]
      summary: Spawn an agent (kernel syscall)
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/agents/{id}:
    get:
      tags: [Orchestration]
      summary: Get an agent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }

  /api/v1/agents/{id}/state:
    patch:
      tags: [Orchestration]
      summary: Update agent state
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/agents/{id}/quarantine:
    post:
      tags: [Orchestration]
      summary: Quarantine an agent (process isolation)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/tasks:
    post:
      tags: [Orchestration]
      summary: Enqueue a task (kernel enqueueTask)
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/tasks/{id}/complete:
    post:
      tags: [Orchestration]
      summary: Mark a task complete
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/tasks/{id}/fail:
    post:
      tags: [Orchestration]
      summary: Mark a task failed
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/status:
    get:
      tags: [Orchestration]
      summary: Scheduler status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/scheduler/tick:
    post:
      tags: [Orchestration]
      summary: Run a scheduler tick (pick next task)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/worker/status:
    get:
      tags: [Orchestration]
      summary: Worker status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/worker/start:
    post:
      tags: [Orchestration]
      summary: Start the worker
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/worker/stop:
    post:
      tags: [Orchestration]
      summary: Stop the worker
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/worker/configure:
    post:
      tags: [Orchestration]
      summary: Configure the worker (Pulse control surface)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/bus/status:
    get:
      tags: [Orchestration]
      summary: IPC bus status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/audit:
    get:
      tags: [Security]
      summary: Verify hash-chained audit integrity
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/audit/anchor:
    post:
      tags: [Security]
      summary: Anchor pending audit entries
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/audit/trajectory:
    post:
      tags: [Security]
      summary: Log an LLM trajectory
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/audit/receipt:
    post:
      tags: [Security]
      summary: Log a tool receipt
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/audit/verify:
    get:
      tags: [Security]
      summary: Advanced audit verification + auto-kill
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/safety/kill-switch:
    get:
      tags: [Security]
      summary: Kill-switch status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }
    post:
      tags: [Security]
      summary: Enable/disable kill switch
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/self-opt/status:
    get:
      tags: [Self-Optimization]
      summary: Auto-tuner control-plane status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/self-opt/tune:
    post:
      tags: [Self-Optimization]
      summary: Apply a tuning recommendation
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/enterprise/orgs:
    get:
      tags: [Enterprise]
      summary: List orgs/tenants
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/enterprise/mesh:
    get:
      tags: [Enterprise]
      summary: Federated mesh status
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/marketplace/skills:
    get:
      tags: [Marketplace]
      summary: List marketplace skills
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/marketplace/skills/{id}/install:
    post:
      tags: [Marketplace]
      summary: Install a marketplace skill
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/skills:
    get:
      tags: [Marketplace]
      summary: List installed skills
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/analytics/recall:
    get:
      tags: [Analytics]
      summary: Recall analytics
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkEnvelope' } } } }

  /api/v1/events:
    get:
      tags: [Kernel]
      summary: Server-Sent Events stream (text/event-stream)
      responses:
        '200': { description: SSE stream }

  /api/v1/mcp:
    get:
      tags: [MCP]
      summary: MCP JSON-RPC (SSE transport handshake)
      responses:
        '200': { description: MCP session }
    post:
      tags: [MCP]
      summary: MCP JSON-RPC endpoint
      responses:
        '200': { description: MCP JSON-RPC response }

  /api/mcp:
    post:
      tags: [MCP]
      summary: MCP HTTP JSON-RPC endpoint
      responses:
        '200': { description: MCP JSON-RPC response }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: NEXUS_API_KEY
      description: >
        Scoped API key. Scopes include: memory:read, memory:write, skill:read,
        skill:write, brain:admin, safety:write, audit:read, vault:read, vault:write.
  schemas:
    OkEnvelope:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data: { type: object, nullable: true }
        traceId: { type: string, example: "req_01HX..." }
    ErrorEnvelope:
      type: object
      properties:
        ok: { type: boolean, example: false }
        error:
          type: object
          properties:
            code: { type: string, example: "NOT_FOUND" }
            message: { type: string, example: "Agent not found." }
        traceId: { type: string, example: "req_01HX..." }

# Notes:
# - SSE endpoints (/api/v1/events, /api/v1/viz/:workflowId) stream text/event-stream.
# - The /api/v3/* upgrade shims (routes/v3-upgrade.ts) are mock-backed (federatedStats) and not yet production.
# - routes.ts mounts these routers under a root /api/v1 (and /api/mcp) prefix; some route files
#   define absolute paths (e.g. /metrics, /api/v1/llm/providers).
