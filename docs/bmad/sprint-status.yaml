status_legend:
  backlog: Identified but not refined for immediate work.
  ready: Dependencies and acceptance criteria are sufficient to start.
  in_progress: Actively being implemented; normally only one story at a time.
  review: Implementation complete and awaiting adversarial senior review.
  done: Acceptance, tests, validation, and review passed.
  blocked: Cannot proceed; blocker and next action required.
  deferred: Intentionally outside the current release or sprint.
