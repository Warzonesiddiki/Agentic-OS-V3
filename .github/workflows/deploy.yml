# Nexus 2.0 Deploy — build hardened standalone image, smoke-test, publish to GHCR.
#
# Owner: Bastion (CODEOWNERS: .github/workflows/)
# Triggers:
#   - push of a semver tag (v*)  -> full build + push (release)
#   - push to main/master        -> build + smoke test only (verify)
#   - workflow_dispatch          -> manual build (no push unless REGISTRY_URL set)
#
# The standalone image (Dockerfile.standalone) bundles the compiled server,
# the built dashboard, nginx, and the entrypoint supervisor into one artifact.
# A post-build health smoke test guarantees the artifact boots before we push.

name: Deploy

on:
  push:
    tags: ['v*']
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build, smoke-test & publish NEXUS standalone image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/v') || secrets.REGISTRY_URL != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build standalone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          push: false
          load: true
          tags: nexus-standalone:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (health endpoint)
        run: |
          set -e
          docker run -d --name nexus-smoke -p 9900:9900 \
            -e NODE_ENV=production \
            -e NEXUS_LLM_PROVIDER=noop \
            nexus-standalone:${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9900/api/v1/health; then
              echo "HEALTH_OK"
              break
            fi
            sleep 3
          done
          # Fail the build if the health endpoint never responded.
          curl -fs http://localhost:9900/api/v1/health >/dev/null
          docker rm -f nexus-smoke

      - name: Push image to GHCR (release tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
