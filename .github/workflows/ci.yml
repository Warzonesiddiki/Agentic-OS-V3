name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run build
      - name: Test
        run: npm test
      - name: Build Docker images
        run: |
          docker build -t nexus-backend -f Dockerfile.backend .
          docker build -t nexus-frontend -f Dockerfile.frontend .
