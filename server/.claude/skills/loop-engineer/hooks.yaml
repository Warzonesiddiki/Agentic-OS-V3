hooks:
  PreToolUse:
    - name: budget-gate
      description: "Block tool execution if budget exceeded"
      command: |
        python3 -c "
        import json, sys
        budget = json.load(open('.claude/skills/loop-engineer/state-templates/loop-budget.md.json', 'r'))
        if budget['budget_pct_used'] >= 95:
            print('BUDGET_EXCEEDED')
            sys.exit(1)
        "
      on_failure: block

    - name: mcp-auth-check
      description: "Verify MCP tool has valid auth before calling"
      command: |
        echo "Verifying MCP auth for: $TOOL_NAME"
      on_failure: warn

    - name: dangerous-command-gate
      description: "Block irreversible bash commands without confirmation"
      command: |
        DANGEROUS="rm -rf|DROP TABLE|kubectl delete|terraform destroy|git push --force|docker system prune"
        if echo "$TOOL_INPUT" | grep -qE "$DANGEROUS"; then
          echo "DANGEROUS_COMMAND_DETECTED: $TOOL_INPUT"
          exit 1
        fi
      on_failure: block

  PostToolUse:
    - name: cycle-cost-tracker
      description: "Log token usage after every LLM tool call"
      command: |
        echo "Cycle cost update: tokens_in=$TOKENS_IN tokens_out=$TOKENS_OUT"
      on_failure: warn

    - name: test-failure-logger
      description: "Log test failures with full output for loop analysis"
      command: |
        if [ "$TOOL_EXIT_CODE" != "0" ]; then
          echo "TOOL_FAILURE: $TOOL_NAME exit=$TOOL_EXIT_CODE"
          echo "$TOOL_OUTPUT" >> .claude/skills/loop-engineer/state-templates/loop-run-log.md
        fi
      on_failure: warn

  PreAgentSpawn:
    - name: subagent-budget-allocation
      description: "Allocate proportional budget to subagents"
      command: |
        echo "Subagent spawning: allocating budget slice"
      on_failure: warn

  PostAgentComplete:
    - name: subagent-result-logger
      description: "Log subagent results to run log"
      command: |
        echo "Subagent completed. Logging results."
      on_failure: warn