version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nexus']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - nexus_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nexus:
    build: .
    container_name: nexus-server
    restart: always
    ports:
      - '9900:9900'
    environment:
      NODE_ENV: production
      PORT: 9900
      DATABASE_URL: postgresql://postgres:nexus_password@postgres:5432/nexus
      NEXUS_REDIS_URL: redis://redis:6379
      NEXUS_BUS_BACKEND: redis
      NEXUS_ALLOWED_ORIGINS: http://127.0.0.1:9900,http://127.0.0.1:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9900/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M

volumes:
  nexus_pgdata:
  nexus_redisdata:
