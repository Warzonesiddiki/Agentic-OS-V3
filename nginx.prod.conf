# ── Production nginx config ──────────────────────────────────────────
# Sits in front of the frontend (static SPA) and server (API).
# TLS certs are mounted at /etc/nginx/ssl/ from the ./certs/ volume.
# ─────────────────────────────────────────────────────────────────────

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ── Rate limiting zones ────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;
  limit_req_zone  $binary_remote_addr  zone=static:10m  rate=200r/s;

  # ── Log format with real IP and timing ─────────────────────────────
  log_format prod '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  '$request_time $upstream_response_time';

  access_log  /var/log/nginx/access.log  prod;
  error_log   /var/log/nginx/error.log   warn;

  # ── Upstreams ──────────────────────────────────────────────────────
  upstream frontend_upstream {
    server frontend:80;
  }

  upstream api_upstream {
    server server:9900;
  }

  # ── TLS (enforced) ─────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── API reverse proxy ────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }

    # ── SSE event stream (no buffering) ──────────────────────────────
    location /api/v1/events {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      proxy_read_timeout 3600s;
    }

    # ── Static SPA ───────────────────────────────────────────────────
    location / {
      limit_req zone=static burst=50 nodelay;

      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
