name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
      NODE_ENV: test
      NEXUS_BUS_BACKEND: memory
      NEXUS_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Enable pgvector extension
        run: docker exec ${{ job.services.postgres.id }} psql -U postgres -d nexus_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'
      - name: Lint server
        working-directory: server
        run: npm run lint
      - name: Typecheck server
        working-directory: server
        run: npm run typecheck
      - name: Generate migration drift check
        working-directory: server
        run: npm run db:generate
      - name: Push schema
        working-directory: server
        run: npm run db:push
      - name: Unit tests
        working-directory: server
        run: npm test
      - name: Integration tests
        working-directory: server
        run: npm run test:integration
      - name: Build server
        working-directory: server
        run: npm run build
      - name: Production dependency audit
        working-directory: server
        run: npm audit --omit=dev

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npx tsc --noEmit
      - name: Build frontend
        run: npm run build
      - name: Production dependency audit
        run: npm audit --omit=dev
