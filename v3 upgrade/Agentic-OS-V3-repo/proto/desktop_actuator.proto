syntax = "proto3";

package nexus.desktop.v1;

service DesktopActuator {
  // Take a screenshot of the desktop.
  rpc Screenshot(ScreenshotRequest) returns (ScreenshotResponse);
  // Execute an action on the desktop (click, type, scroll, keypress).
  rpc Actuate(ActuateRequest) returns (ActuateResponse);
  // Get cursor position.
  rpc GetCursorPosition(Empty) returns (CursorPosition);
  // Type text at the current cursor position.
  rpc TypeText(TypeTextRequest) returns (ActuateResponse);
}

message Empty {}

message ScreenshotRequest {
  // Optional region to capture (full screen if unset).
  optional Rect region = 1;
}

message Rect {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message ScreenshotResponse {
  // PNG bytes of the screenshot.
  bytes image_png = 1;
  int64 timestamp_ms = 2;
}

message ActuateRequest {
  string action = 1; // "click", "double_click", "right_click", "scroll", "keypress"
  // Coordinates for click actions.
  optional int32 x = 2;
  optional int32 y = 3;
  // Key(s) for keypress action (e.g. "Enter", "Ctrl+C").
  optional string keys = 4;
  // Scroll amount (negative = up, positive = down).
  optional int32 scroll_amount = 5;
}

message ActuateResponse {
  bool success = 1;
  optional string error = 2;
  optional CursorPosition cursor_after = 3;
}

message CursorPosition {
  int32 x = 1;
  int32 y = 2;
}

message TypeTextRequest {
  string text = 1;
  // Delay between keystrokes in ms.
  int32 delay_ms = 2;
}
